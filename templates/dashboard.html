<!DOCTYPE html>
<html>
<head>
<title>ResQGo Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #08162b;
    color: white;
}

.wrapper {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.left {
    width: 35%;
    background: #0b1f3a;
    padding: 15px;
    overflow-y: auto;
}

.card {
    background: #102a4a;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.block {
    background: #0e2a4a;
    padding: 8px;
    border-radius: 6px;
    margin-top: 5px;
}

/* MAP */
#map {
    width: 65%;
    height: 100%;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

    <div class="card">
        <b>🚑 Status</b>
        <div id="status">Loading...</div>
    </div>

    <div class="card">
        <b>👤 Patient</b>
        <div id="patient"></div>
    </div>

    <div class="card">
        <b>📍 Pickup</b>
        <div id="pickup"></div>
    </div>

    <div class="card">
        <b>🏥 Hospital</b>
        <div id="hospital"></div>
    </div>

    <div class="card">
        <b>🚑 Ambulance</b>
        <div id="ambulance"></div>
    </div>

</div>

<!-- MAP -->
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

let map = L.map('map').setView([12.97, 77.59], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

let ambulanceIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/2967/2967347.png",
    iconSize: [40, 40]
});

let ambulanceMarker;
let pickupMarker;

/* SOCKET CONNECTION */
const socket = io();

/* LIVE TRACKING */
socket.on("live_update", function(data) {

    if (ambulanceMarker) {
        ambulanceMarker.setLatLng([data.lat, data.lon]);
        map.panTo([data.lat, data.lon]); // like Ola/Uber tracking
    }
});

/* LOAD DATA */
function load() {

    let data = JSON.parse(localStorage.getItem("ambulance_data"));

    if (!data) {
        document.getElementById("status").innerText = "No request found";
        return;
    }

    document.getElementById("patient").innerHTML =
        `<div class="block">${data.name || "N/A"}</div>`;

    document.getElementById("pickup").innerHTML =
        `<div class="block">${data.location || "N/A"}</div>`;

    document.getElementById("hospital").innerHTML =
        `<div class="block">${data.hospital || "Apollo Hospital"}</div>`;

    document.getElementById("status").innerText = "🚑 Ambulance Assigned";

    document.getElementById("ambulance").innerHTML =
        `🚑 ${data.ambulance || "AMB-101"}`;

    startMap();
}

/* MAP INIT */
function startMap() {

    let start = [12.96, 77.58];
    let end = [12.97, 77.59];

    // ambulance marker
    ambulanceMarker = L.marker(start, { icon: ambulanceIcon }).addTo(map);

    // pickup marker (blue circle like Uber)
    pickupMarker = L.circleMarker(end, {
        radius: 10,
        color: "blue",
        fillColor: "blue",
        fillOpacity: 0.8
    }).addTo(map).bindPopup("Pickup Location");

}

window.onload = load;

</script>

</body>
</html>
