<!DOCTYPE html>
<html>
<head>
<title>ResQGo Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1f3a; /* dark blue theme */
    color: white;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: #08162b;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-right: 20px;
    font-weight: bold;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* LEFT PANEL */
.left {
    width: 40%;
    padding: 20px;
    background: #0f2a4d;
}

.card {
    background: #153a66;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
}

/* RIGHT PANEL */
.right {
    width: 60%;
    background: #0b1f3a;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 2px solid #1d3557;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.track {
    background: #E63946;
    color: white;
}

.home {
    background: white;
    color: #0b1f3a;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div>
        <a href="/">🏠 Home</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div>
        <b>🚑 ResQGo</b>
    </div>

</div>

<!-- MAIN -->
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

    <h2>🚑 Ambulance Tracking</h2>

    <div class="card">👤 Patient Name: <span id="name">-</span></div>
    <div class="card">📍 Current Location: <span id="current">-</span></div>
    <div class="card">📌 Pickup Location: <span id="pickup">-</span></div>
    <div class="card">🏥 Destination: <span id="dest">-</span></div>
    <div class="card">⏱ Timestamp: <span id="time">-</span></div>
    <div class="card">🚨 ETA: <span id="eta">-</span></div>
    <div class="card">⚡ Avg Speed: <span id="speed">-</span></div>

    <button class="track" onclick="location.href='/request_page'">
        Track Another Ambulance
    </button>

    

</div>

    <!-- RIGHT SIDE -->
   <div class="right">
    <iframe
        id="mapFrame"
        width="100%"
        height="100%"
        frameborder="0"
        style="border:0"
        src="https://www.google.com/maps?q=HSR%20Layout%20Bangalore&output=embed">
    </iframe>
</div>
</body>
<script>
let data = JSON.parse(localStorage.getItem("ambulance_data"));

if (data) {

    document.getElementById("name").innerText = data.name || "-";
    document.getElementById("current").innerText = data.location || "-";
    document.getElementById("pickup").innerText = data.location || "-";
    document.getElementById("dest").innerText = data.hospital || "-";

    document.getElementById("time").innerText = new Date().toLocaleString();
    document.getElementById("eta").innerText = data.time ? data.time + " min" : "-";
    document.getElementById("speed").innerText = "45 km/h";

    // 🚑 SIMPLE ROUTE MAP (WORKING)
    let origin = data.location;
    let destination = data.hospital;

    document.getElementById("mapFrame").src =
        "https://www.google.com/maps?q=" +
        encodeURIComponent(origin + " to " + destination) +
        "&output=embed";
}
</script>
